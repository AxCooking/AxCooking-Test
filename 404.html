<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>AxCooking</title>
  <script>
    var l = window.location;
    var seg = l.pathname.split('/');
    // Für Project-Sites (z.B. /AxCooking-Test/): ersten Segment als base
    var isProject = seg.length > 1 && seg[1] !== 'de' && seg[1] !== 'en' && seg[1] !== '';
    var base = isProject ? '/' + seg[1] : '';
    var path = isProject ? '/' + seg.slice(2).join('/') : l.pathname;

    // Wenn path leer oder nur "/" → direkt auf Root weiterleiten (kein ?p= nötig)
    if (path === '' || path === '/') {
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + base + '/');
    } else {
      var rest = l.search ? l.search.slice(1) : '';
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        base + '/?p=' + encodeURIComponent(path) + (rest ? '&' + rest : '') +
        l.hash
      );
    }
  </script>
</head>
<body></body>
</html>
