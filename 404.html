<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>AxCooking</title>
  <script>
    var l = window.location;
    var seg = l.pathname.split('/');
    // Auf axcooking.github.io: erstes Segment ist der Repo-Name (z.B. AxCooking-Test)
    // Auf test.axcooking.com: kein Prefix, base ist leer
    var isGithubIO = l.hostname === 'axcooking.github.io';
    var base = isGithubIO && seg.length > 1 && seg[1] !== 'de' && seg[1] !== 'en' && seg[1] !== ''
      ? '/' + seg[1] : '';
    var path = isGithubIO && base ? '/' + seg.slice(2).join('/') : l.pathname;

    // Leerer Pfad -> direkt auf Root
    if (path === '' || path === '/') {
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + base + '/');
    } else {
      var rest = l.search ? l.search.slice(1) : '';
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        base + '/?p=' + encodeURIComponent(path) + (rest ? '&' + rest : '') +
        l.hash
      );
    }
  </script>
</head>
<body></body>
</html>
