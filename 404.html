<!DOCTYPE html><html><head>
<meta charset="UTF-8">
<title>AxCooking</title>
<script>
// Redirect old paths to hash-based routing
var p=window.location.pathname.replace(/\/$/,'');
var m=p.match(/^(?:\/AxCooking)?\/(de|en)(?:\/(.+))?/);
if(m){
  var hash=m[2]?'#/'+m[1]+'/recipe/'+m[2]:'#/'+m[1];
  window.location.replace(window.location.origin+'/'+hash);
} else {
  window.location.replace(window.location.origin+'/');
}
</script>
</head><body>
<p>Weiterleitung zu <a href="https://www.axcooking.com/">AxCooking</a>...</p>
</body></html>
